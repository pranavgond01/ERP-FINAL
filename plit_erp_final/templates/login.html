{% extends "base.html" %}
{% block content %}

<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card glass-card p-4">
            <h3 class="text-center fw-bold text-primary">Login to ERP</h3>
            <p class="text-center text-muted">Student | Teacher | Principal</p>

            <form method="POST">
                <input type="email" name="email" class="form-control mb-3" placeholder="Email" required>
                <input type="password" name="password" class="form-control mb-3" placeholder="Password" required>
                <button class="btn btn-primary w-100">Login</button>
            </form>

            <hr>
            <p><b>Student:</b> student@plit.ac.in / student123</p>
            <p><b>Teacher:</b> teacher@plit.ac.in / teacher123</p>
            <p><b>Principal:</b> principal@plit.ac.in / principal123</p>
        </div>
    </div>
</div>

{% endblock %}
